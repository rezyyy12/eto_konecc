.btn:hover{transform:scale(1.05);filter:brightness(1.15);background:rgba(20,20,40,0.85)}
.footer{position:fixed;bottom:2vh;left:5vw;font-size:0.75rem;opacity:0.7;color:#000;font-weight:300;text-shadow:0 1px 3px rgba(255,255,255,0.5);z-index:2}
